name: Telegram Notify

on:
  push:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, closed, ready_for_review]
  issues:
    types: [opened, edited, closed, reopened]
  issue_comment:
    types: [created, edited]
  release:
    types: [published, prereleased, released]
  create:
  delete:
  workflow_run:
    workflows: ["Trigger Web Sync"]
    types: [in_progress, completed]

jobs:
  notify:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.name != github.workflow }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Build Telegram message
        id: msg
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          event_name = os.environ["GITHUB_EVENT_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          actor = os.environ["GITHUB_ACTOR"]
          action = os.environ.get("EVENT_ACTION", "") or "-"
          repo_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}"
          ref_name = os.environ.get("GITHUB_REF_NAME", "") or "-"

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as fh:
              payload = json.load(fh)

          def value(item, default="-"):
              if item in (None, ""):
                  return default
              return str(item)

          text = "\n".join(
              [
                  f"📣 Event: {event_name}",
                  f"Repo: {repo}",
                  f"Actor: {actor}",
                  repo_url,
              ]
          )

          if event_name == "push":
              commits = payload.get("commits") or []
              text = "\n".join(
                  [
                      "🚀 Push",
                      f"Repo: {repo}",
                      f"Branch: {ref_name}",
                      f"Actor: {actor}",
                      f"Commit sayisi: {len(commits)}",
                      value(payload.get("compare"), repo_url),
                  ]
              )
          elif event_name == "pull_request":
              pr = payload.get("pull_request") or {}
              text = "\n".join(
                  [
                      f"🔀 Pull Request ({action})",
                      f"Repo: {repo}",
                      f"Title: {value(pr.get('title'))}",
                      f"Actor: {actor}",
                      f"Branch: {value((pr.get('head') or {}).get('ref'))} -> {value((pr.get('base') or {}).get('ref'))}",
                      value(pr.get("html_url"), repo_url),
                  ]
              )
          elif event_name == "issues":
              issue = payload.get("issue") or {}
              text = "\n".join(
                  [
                      f"🐞 Issue ({action})",
                      f"Repo: {repo}",
                      f"Title: {value(issue.get('title'))}",
                      f"Actor: {actor}",
                      value(issue.get("html_url"), repo_url),
                  ]
              )
          elif event_name == "issue_comment":
              issue = payload.get("issue") or {}
              comment = payload.get("comment") or {}
              text = "\n".join(
                  [
                      f"💬 Issue Comment ({action})",
                      f"Repo: {repo}",
                      f"Issue: {value(issue.get('title'))}",
                      f"Actor: {actor}",
                      value(comment.get("html_url"), repo_url),
                  ]
              )
          elif event_name == "release":
              release = payload.get("release") or {}
              text = "\n".join(
                  [
                      f"📦 Release ({action})",
                      f"Repo: {repo}",
                      f"Tag: {value(release.get('tag_name'))}",
                      f"Actor: {actor}",
                      value(release.get("html_url"), repo_url),
                  ]
              )
          elif event_name == "create":
              text = "\n".join(
                  [
                      "🧱 Create",
                      f"Repo: {repo}",
                      f"Ref type: {value(payload.get('ref_type'))}",
                      f"Ref: {value(payload.get('ref'))}",
                      f"Actor: {actor}",
                      repo_url,
                  ]
              )
          elif event_name == "delete":
              text = "\n".join(
                  [
                      "🗑 Delete",
                      f"Repo: {repo}",
                      f"Ref type: {value(payload.get('ref_type'))}",
                      f"Ref: {value(payload.get('ref'))}",
                      f"Actor: {actor}",
                      repo_url,
                  ]
              )
          elif event_name == "workflow_run":
              workflow_run = payload.get("workflow_run") or {}
              workflow_actor = value((workflow_run.get("actor") or {}).get("login"), actor)
              text = "\n".join(
                  [
                      f"⚙️ Workflow Run ({action})",
                      f"Repo: {repo}",
                      f"Workflow: {value(workflow_run.get('name'))}",
                      f"Branch: {value(workflow_run.get('head_branch'))}",
                      f"Actor: {workflow_actor}",
                      f"Status: {value(workflow_run.get('status'))}",
                      f"Conclusion: {value(workflow_run.get('conclusion'))}",
                      value(workflow_run.get("html_url"), repo_url),
                  ]
              )

          print("text<<EOF")
          print(text)
          print("EOF")
          PY
        env:
          EVENT_ACTION: ${{ github.event.action }}

      - name: Skip when Telegram secrets are unavailable
        if: ${{ env.TELEGRAM_BOT_TOKEN == '' || env.TELEGRAM_CHAT_ID == '' }}
        run: echo "Telegram secrets are not available for this run. Skipping notification."

      - name: Send to Telegram
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${{ steps.msg.outputs.text }}"
